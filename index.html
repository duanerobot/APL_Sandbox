<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>APL_Sandbox</title>
<link rel="stylesheet" href="https://unpkg.com/litegraph.js@0.7.18/css/litegraph.css">
<style>
/* в”Җв”Җ reset & theme в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
:root {
  --bg:       #000000;
  --bg2:      #080808;
  --bg3:      #0d0d0d;
  --fg:       #00ff00;
  --fg-dim:   #004d00;
  --fg-mid:   #00aa00;
  --accent:   #ff00ff;
  --acc-dim:  #550055;
  --err:      #ff4444;
  --border:   #1a1a1a;
  --bar-h:    36px;
  --kb-h:     0px;  /* set by JS when keyboard is open */
  --font:     'Fira Code', 'Cascadia Code', 'Source Code Pro', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; background: var(--bg); color: var(--fg);
  font-family: var(--font); font-size: 13px; overflow: hidden; }

/* в”Җв”Җ toolbar в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
#toolbar { position: fixed; top: 0; left: 0; right: 0; height: var(--bar-h);
  background: var(--bg2); border-bottom: 1px solid var(--fg-dim);
  display: flex; align-items: center; gap: 6px; padding: 0 10px; z-index: 100;
  user-select: none; }
#logo { font-size: 14px; font-weight: bold; letter-spacing: 0.1em; color: var(--fg);
  margin-right: 6px; }
.btn { background: var(--bg3); border: 1px solid var(--fg-dim); color: var(--fg);
  font-family: var(--font); font-size: 11px; padding: 3px 9px; cursor: pointer;
  letter-spacing: 0.04em; transition: border-color .1s, color .1s; }
.btn:hover   { border-color: var(--fg); }
.btn:active  { background: var(--fg-dim); }
.btn.run     { border-color: var(--accent); color: var(--accent); }
.btn.run:hover { background: var(--acc-dim); }
.btn.active  { border-color: var(--fg); background: var(--fg-dim); }
#file-input  { display: none; }
#sep         { flex: 1; }
#status { display: flex; gap: 10px; font-size: 10px; letter-spacing: 0.04em; }
.dot { font-size: 9px; margin-right: 2px; }
.status-item       { color: var(--fg-dim); }
.status-item.ok    { color: var(--fg-mid); }
.status-item.error { color: var(--err); }

/* в”Җв”Җ canvas в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
#canvas-wrap { position: fixed; top: var(--bar-h); left: 0; right: 0;
  bottom: calc(20px + var(--kb-h)); }
canvas#mycanvas { display: block; width: 100%; height: 100%; background: var(--bg); }

/* в”Җв”Җ APL glyph keyboard в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
#glyph-kb { position: fixed; left: 0; right: 0; bottom: 20px; z-index: 90;
  background: var(--bg2); border-top: 1px solid var(--fg-dim);
  padding: 5px 8px 7px; display: none; }
#glyph-kb.open { display: block; }
.kb-row { display: flex; align-items: center; gap: 1px; margin-bottom: 2px; }
.kb-cat { font-size: 9px; color: var(--fg-dim); width: 70px; flex-shrink: 0;
  text-align: right; padding-right: 6px; letter-spacing: 0.04em; }
.kb-glyph { background: #050505; border: 1px solid #001a00; color: #00cc00;
  font-family: var(--font); font-size: 14px; width: 24px; height: 22px;
  cursor: pointer; padding: 0; line-height: 22px; text-align: center; }
.kb-glyph:hover { border-color: var(--fg); background: #001400; color: var(--fg); }
.kb-tip { font-size: 9px; color: #003300; margin-left: 8px; align-self: center; }

/* в”Җв”Җ glyph tooltip в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
#glyph-tooltip { position: fixed; z-index: 200; pointer-events: none;
  background: #030f03; border: 1px solid #00aa00; color: #00cc00;
  font-family: var(--font); font-size: 11px; padding: 4px 8px;
  max-width: 320px; white-space: pre-wrap; line-height: 1.4;
  display: none; box-shadow: 0 0 8px #001a00; }

/* в”Җв”Җ log bar в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
#logbar { position: fixed; bottom: 0; left: 0; right: 0; height: 20px;
  background: var(--bg2); border-top: 1px solid var(--fg-dim);
  display: flex; align-items: center; padding: 0 10px; font-size: 11px;
  color: var(--fg-dim); overflow: hidden; white-space: nowrap; }
#logbar.error { color: var(--err); }
#logbar.ok    { color: var(--fg-mid); }

/* в”Җв”Җ litegraph overrides в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.litegraph .litemenu-entry:hover { background: var(--fg-dim); }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--fg-dim); }
::-webkit-scrollbar-thumb:hover { background: var(--fg-mid); }
</style>
</head>

<body>
<!-- в”Җв”Җ toolbar в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ -->
<div id="toolbar">
  <span id="logo">вҚқ APL_Sandbox</span>
  <button class="btn run" id="btn-run"   title="Run graph (Ctrl+Enter)">в–¶ RUN</button>
  <button class="btn"     id="btn-merge" title="Merge 2 selected function nodes into a train (вҠӮ)">вҠӮ MERGE</button>
  <button class="btn"     id="btn-kb"    title="Toggle APL glyph keyboard">вҢЁ KEYS</button>
  <button class="btn"     id="btn-box"   title="Toggle box display (вҺ•SE.Dyalog.Utils.display)">вҳҗ BOX</button>
  <button class="btn"     id="btn-save"  title="Save graph (Ctrl+S)">в¬Ү SAVE</button>
  <label  class="btn"     title="Load graph">в¬Ҷ LOAD<input type="file" id="file-input" accept=".json"></label>
  <button class="btn"     id="btn-clear" title="Clear canvas">вң• CLEAR</button>
  <span id="sep"></span>
  <div id="status">
    <span class="status-item" id="st-dyalog"><span class="dot">в—Ҹ</span>DYALOG</span>
    <span class="status-item" id="st-rhino"><span class="dot">в—Ҹ</span>RHINO</span>
  </div>
</div>

<!-- в”Җв”Җ canvas в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ -->
<div id="canvas-wrap"><canvas id="mycanvas"></canvas></div>

<!-- в”Җв”Җ APL glyph keyboard в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ -->
<div id="glyph-kb"></div>
<div id="glyph-tooltip"></div>

<!-- в”Җв”Җ log bar в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ -->
<div id="logbar">ready</div>

<!-- в”Җв”Җ litegraph в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ -->
<script src="https://unpkg.com/litegraph.js@0.7.18/build/litegraph.js"></script>

<script>
'use strict';

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// 0. GLYPH DESCRIPTIONS  (shown in keyboard tooltip)
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
var GLYPH_DESC = {
  '+':'Add  |  Plus  |  Conjugate', '-':'Subtract  |  Negate',
  'Г—':'Multiply  |  Sign  |  Direction', 'Г·':'Divide  |  Reciprocal',
  '*':'Power  |  e^x', 'вҢҠ':'Floor  |  Minimum', 'вҢҲ':'Ceiling  |  Maximum',
  '|':'Residue (mod)  |  Magnitude', '!':'Combinations  |  Factorial',
  '?':'Deal (rand without replace)  |  Roll',
  '<':'Less  |  Grade Down?', 'вүӨ':'Less Or Equal', '=':'Equal  |  Depth',
  'вүҘ':'Greater Or Equal', '>':'Greater', 'вү ':'Not Equal  |  Unique',
  'вҲ§':'And  |  LCM', 'вҲЁ':'Or  |  GCD', 'вҚІ':'Nand', 'вҚұ':'Nor', '~':'Not  |  Without',
  'вҚі':'Iota вҖ” Index Generator  |  Index Of   e.g.  вҚі5 вҶ’ 1 2 3 4 5',
  'вҚҙ':'Rho вҖ” Shape  |  Reshape   e.g.  3 3вҚҙвҚі9',
  'вүў':'Tally вҖ” Length of leading axis', 'вүЎ':'Match  |  Depth',
  ',':'Ravel  |  Catenate', 'вҚӘ':'Table  |  Catenate First',
  'вҶ‘':'Take  |  Mix', 'вҶ“':'Drop  |  Split',
  'вҠҶ':'Partition  |  Enclose If', 'вҠӮ':'Enclose  |  Partition',
  'вҠғ':'First  |  Pick', 'вҲҠ':'Enlist  |  Membership',
  'вҚ·':'Find', 'вҢ·':'Index (squad)', 'вҚё':'Where  |  Interval Index',
  'вҢҪ':'Reverse  |  Rotate', 'вҠ–':'Reverse First  |  Rotate First',
  'вҚү':'Transpose', 'вҚӢ':'Grade Up', 'вҚ’':'Grade Down',
  'вҠў':'Right (pass-through)  |  Same', 'вҠЈ':'Left  |  Same',
  'вҠӨ':'Encode', 'вҠҘ':'Decode  |  Base',
  '/':'Reduce  |  Replicate', '\\':'Scan  |  Expand',
  'вҢҝ':'Reduce First  |  Replicate First', 'вҚҖ':'Scan First  |  Expand First',
  'в—Ӣ':'Pi Times  |  Trig functions', 'вҢ№':'Matrix Divide  |  Matrix Inverse',
  'вҚҹ':'Natural Log  |  Log Base', 'вҲҳ.':'Outer Product   e.g.  вҲҳ.Г—',
  'вҚ•':'Format (to string)', 'вҚҺ':'Execute (eval string)',
  'вҺ•':'Quad вҖ” Evaluated Input  |  Print', 'вҚһ':'Quote-Quad вҖ” Character Input',
  'ВЁ':'Each   e.g.  вҚіВЁ1 2 3', 'вҚЁ':'Selfie / Commute   e.g.  +вҚЁ5 вҶ’ 10',
  'вҚЈ':'Power Operator   e.g.  fвҚЈn', 'вҚӨ':'Rank Operator   e.g.  +вҚӨ1',
  'вҚҘ':'Over Operator', 'вҲҳ':'Compose / Bind   e.g.  +вҲҳ1',
  '@':'At  |  Selective Assignment', 'вҢё':'Key', 'вҢә':'Stencil',
  '{':'Open dfn', '}':'Close dfn',
  'вҚө':'Omega вҖ” Right argument in dfn', 'вҚә':'Alpha вҖ” Left argument in dfn',
  'вҚ¶':'Alpha-underbar вҖ” Left operand', 'вҚ№':'Omega-underbar вҖ” Right operand',
  'вӢ„':'Statement separator', 'вҶ’':'Branch  |  Goto', 'вҶҗ':'Assign',
  'вҲҮ':'Self-reference in dfn  |  Tradfn marker',
  'вҚ¬':'Zilde вҖ” empty numeric vector',
  'вҚқ':'Comment (lamp)', 'вҚ ':'Variant Operator',
  'вҚ«':'Lock',
  'вҺ•IOвҶҗ0':'Set index origin to 0 (0-based arrays)',
  'вҺ•IOвҶҗ1':'Set index origin to 1 (default)',
};

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// 1. LITEGRAPH THEME
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
LiteGraph.NODE_DEFAULT_COLOR        = "#111111";
LiteGraph.NODE_DEFAULT_BGCOLOR      = "#080808";
LiteGraph.NODE_DEFAULT_BOXCOLOR     = "#00ff00";
LiteGraph.NODE_TITLE_COLOR          = "#00ff00";
LiteGraph.NODE_SELECTED_TITLE_COLOR = "#ff00ff";
LiteGraph.NODE_TEXT_SIZE            = 12;
LiteGraph.NODE_TEXT_COLOR           = "#00cc00";
LiteGraph.NODE_SUBTEXT_SIZE         = 10;
LiteGraph.NODE_SLOT_HEIGHT          = 40;
LiteGraph.WIDGET_BGCOLOR            = "#0d0d0d";
LiteGraph.WIDGET_TEXT_COLOR         = "#00cc00";
LiteGraph.WIDGET_OUTLINE_COLOR      = "#003300";
LiteGraph.LINK_COLOR                = "#00aa00";
LiteGraph.EVENT_LINK_COLOR          = "#ff00ff";
LiteGraph.CONNECTING_LINK_COLOR     = "#ff00ff";
LiteGraph.DEFAULT_SHADOW_COLOR      = "transparent";


// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// 2. RTL BEZIER PATCH
// Wires that flow right-to-left (source_x > dest_x) get clean
// backward-curving beziers instead of looping forward ones.
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
var _origRenderLink = LGraphCanvas.prototype.renderLink;
LGraphCanvas.prototype.renderLink = function(ctx, a, b, link, skip_border, flow, color) {
  if (a[0] > b[0] + 15) {
    // RTL wire: draw our own clean backward bezier
    var dist = Math.min(Math.abs(a[0] - b[0]) * 0.45 + 30, 200);
    ctx.beginPath();
    ctx.moveTo(a[0], a[1]);
    ctx.bezierCurveTo(
      a[0] - dist, a[1],   // pull LEFT from start
      b[0] + dist, b[1],   // arrive from RIGHT at end
      b[0], b[1]
    );
    ctx.strokeStyle = color || this.default_link_color || '#00aa00';
    ctx.lineWidth   = (this.connections_width || 2) * (this.ds ? this.ds.scale : 1);
    ctx.stroke();
    return;
  }
  return _origRenderLink.call(this, ctx, a, b, link, skip_border, flow, color);
};


// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// 3. GLYPH KEYBOARD INTERCEPT
// Patch createDialog so we can always find the active text input.
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
var _origCreateDialog = LGraphCanvas.prototype.createDialog;
LGraphCanvas.prototype.createDialog = function(html, options) {
  var dlg = _origCreateDialog.call(this, html, options);
  if (dlg) {
    var inp = dlg.querySelector('input[type="text"]');
    if (inp) window._aplKbTarget = inp;
  }
  return dlg;
};


// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// 4. NODE TYPE DEFINITIONS
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ

// в”Җв”Җ drawing helpers в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

// Draw our own slot dot at node-local (x,y).
// connected=true вҶ’ bright yellow; false вҶ’ dim green.
function drawSlotDot(ctx, x, y, connected) {
  var r = 5;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle   = connected ? '#ddaa00' : '#003a00';
  ctx.fill();
  ctx.strokeStyle = connected ? '#ffcc00' : '#005500';
  ctx.lineWidth   = 1;
  ctx.stroke();
}

// Cover a default litegraph dot with a filled circle of bgcolor.
function coverDot(ctx, x, y, bgcolor) {
  ctx.beginPath();
  ctx.arc(x, y, 8, 0, Math.PI * 2);
  ctx.fillStyle = bgcolor;
  ctx.fill();
}

// Wrap text lines to fit maxW pixels.
function wrapText(ctx, text, maxW) {
  var result = [], lines = String(text).split('\n');
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    if (ctx.measureText(line).width <= maxW) { result.push(line); continue; }
    var cur = '';
    for (var j = 0; j < line.length; j++) {
      var test = cur + line[j];
      if (ctx.measureText(test).width > maxW && cur) { result.push(cur); cur = line[j]; }
      else cur = test;
    }
    if (cur) result.push(cur);
  }
  return result;
}

// Draw result text inside a panel node.
function drawPanelResult(ctx, node) {
  var w = node.size[0], h = node.size[1], pad = 8;
  var text = node._result;
  if (!text) {
    ctx.font      = '11px monospace';
    ctx.fillStyle = '#003300';
    ctx.fillText('вҖ” not evaluated вҖ”', pad, 28);
    return;
  }
  ctx.font      = '12px "Fira Code", "Cascadia Code", monospace';
  ctx.fillStyle = node._is_error ? '#ff4444' : '#00dd00';
  var lines = wrapText(ctx, text, w - pad * 2);
  var lh = 16, y = 24, max_y = h - pad;
  for (var i = 0; i < lines.length; i++) {
    if (y > max_y) break;
    ctx.fillText(lines[i], pad, y);
    y += lh;
  }
}


// в”Җв”Җ APL/Input в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function APLInputNode() {
  this.addOutput("", "array");
  this.properties = { data: "1 2 3 4 5" };
  this.size    = [200, 90];
  this.color   = "#001500";
  this.bgcolor = "#000a00";
  this._result = ""; this._is_error = false;
  var self = this;
  this._widget = this.addWidget("text", "вҚө data", this.properties.data, function(v) {
    self.properties.data = v;
  });
}
APLInputNode.title = "Input";
APLInputNode.desc  = "APL data вҖ” e.g.  3 3вҚҙвҚі9  or  1 2 3";

// After load/undo, sync widget display from restored properties
APLInputNode.prototype.onConfigure = function() {
  if (this._widget) this._widget.value = this.properties.data || '';
};

// Expand hit area leftward to include the port dot outside the node
APLInputNode.prototype.isPointInside = function(x, y, margin) {
  margin = margin || 0;
  var pad = 20;
  return x >= this.pos[0] - pad - margin &&
         x <= this.pos[0] + this.size[0] + margin &&
         y >= this.pos[1] - margin &&
         y <= this.pos[1] + this.size[1] + margin;
};

// Output exits LEFT (data flows leftward toward Function)
APLInputNode.prototype.getConnectionPos = function(is_input, num, out) {
  out = out || new Float32Array(2);
  var H = LiteGraph.NODE_TITLE_HEIGHT || 20;
  var S = LiteGraph.NODE_SLOT_HEIGHT  || 40;
  var px = this.pos[0], py = this.pos[1];
  if (!is_input && num === 0) {         // value вҶ’ LEFT
    out[0] = px - H * 0.5;
    out[1] = py + H + S * 0.5;
  }
  return out;
};

APLInputNode.prototype.onDrawForeground = function(ctx) {
  var H  = LiteGraph.NODE_TITLE_HEIGHT || 20;
  var S  = LiteGraph.NODE_SLOT_HEIGHT  || 40;
  var W  = this.size[0];
  var y0 = H + S * 0.5;
  var bg = this.bgcolor || '#000a00';

  // Cover default output dot (litegraph draws it at right edge)
  coverDot(ctx, W, y0, bg);
  // Draw custom output dot on LEFT
  var conn = this.outputs[0] && this.outputs[0].links && this.outputs[0].links.length > 0;
  drawSlotDot(ctx, -H * 0.5, y0, conn);

  ctx.font = '10px monospace';
  ctx.fillStyle = '#006600';
  ctx.textAlign = 'left';
  ctx.fillText('вҶҗ value', 4, y0 + 4);
  ctx.textAlign = 'left';
};

LiteGraph.registerNodeType("APL/Input", APLInputNode);


// в”Җв”Җ APL/Function в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function APLFunctionNode() {
  // Both inputs on RIGHT; output on LEFT.
  this.addInput("", "array");   // slot 0 = вҚө  (right arg)
  this.addInput("", "array");   // slot 1 = вҚә  (left arg)
  this.addOutput("", "array");  // slot 0 = вҶҗ result
  this.properties = { expr: "вҚі" };
  this.size    = [200, 140];
  this.color   = "#001100";
  this.bgcolor = "#000800";
  this._result = ""; this._is_error = false;
  var self = this;
  this._widget = this.addWidget("text", "вҚә f вҚө", this.properties.expr, function(v) {
    self.properties.expr = v;
    self.title = v || "Function";
  });
  this.title = this.properties.expr || "Function";
}
APLFunctionNode.title = "Function";
APLFunctionNode.desc  = "APL function вҖ” glyph, train, or dfn";

// After load/undo, sync widget display from restored properties
APLFunctionNode.prototype.onConfigure = function() {
  if (this._widget) {
    this._widget.value = this.properties.expr || '';
    this.title = this.properties.expr || 'Function';
  }
};

// Expand hit area on BOTH sides to include port dots outside the node
APLFunctionNode.prototype.isPointInside = function(x, y, margin) {
  margin = margin || 0;
  var pad = 20;
  return x >= this.pos[0] - pad - margin &&
         x <= this.pos[0] + this.size[0] + pad + margin &&
         y >= this.pos[1] - margin &&
         y <= this.pos[1] + this.size[1] + margin;
};

// вҚө and вҚә both on RIGHT (40px apart); вҶҗ result on LEFT centred between them.
APLFunctionNode.prototype.getConnectionPos = function(is_input, num, out) {
  out = out || new Float32Array(2);
  var H  = LiteGraph.NODE_TITLE_HEIGHT || 20;
  var S  = LiteGraph.NODE_SLOT_HEIGHT  || 40;
  var W  = this.size[0];
  var px = this.pos[0], py = this.pos[1];
  if      (is_input  && num === 0) { out[0] = px + W + H * 0.5; out[1] = py + H + S * 0.5; }  // вҚө
  else if (is_input  && num === 1) { out[0] = px + W + H * 0.5; out[1] = py + H + S * 1.5; }  // вҚә
  else if (!is_input)              { out[0] = px - H * 0.5;      out[1] = py + H + S * 1.0; }  // вҶҗ
  return out;
};

APLFunctionNode.prototype.onDrawForeground = function(ctx) {
  var H  = LiteGraph.NODE_TITLE_HEIGHT || 20;
  var S  = LiteGraph.NODE_SLOT_HEIGHT  || 40;
  var W  = this.size[0];
  var y0 = H + S * 0.5;   // вҚө
  var y1 = H + S * 1.5;   // вҚә
  var ym = H + S * 1.0;   // вҶҗ (midpoint)
  var bg = this.bgcolor || '#000800';

  // Cover default litegraph dots (inputs at x=0, output at x=W)
  coverDot(ctx, 0, y0, bg);
  coverDot(ctx, 0, y1, bg);
  coverDot(ctx, W, H + S * 0.5, bg);  // litegraph default output position

  // Custom dots
  var omegaConn = this.inputs[0] && this.inputs[0].link != null;
  var alphaConn = this.inputs[1] && this.inputs[1].link != null;
  var outConn   = this.outputs[0] && this.outputs[0].links && this.outputs[0].links.length > 0;
  drawSlotDot(ctx, W + H * 0.5, y0, omegaConn);  // вҚө
  drawSlotDot(ctx, W + H * 0.5, y1, alphaConn);  // вҚә
  drawSlotDot(ctx, -H * 0.5,    ym, outConn);     // вҶҗ

  // Big expression
  ctx.save();
  ctx.font      = 'bold 22px "Fira Code", monospace';
  ctx.fillStyle = this._is_error ? '#ff4444' : '#00ff00';
  ctx.textAlign = 'center';
  ctx.fillText(this.properties.expr || '', W * 0.5, ym + 7);
  ctx.restore();

  // Slot labels
  ctx.font = '10px monospace';
  ctx.textAlign = 'right';
  ctx.fillStyle = '#007700'; ctx.fillText('вҚө', W - 4, y0 + 4);
  ctx.fillStyle = '#004400'; ctx.fillText('вҚә', W - 4, y1 + 4);
  ctx.textAlign = 'left';
  ctx.fillStyle = '#005500'; ctx.fillText('вҶҗ', 4, ym + 4);
};

LiteGraph.registerNodeType("APL/Function", APLFunctionNode);


// в”Җв”Җ APL/Panel в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function APLPanelNode() {
  this.addInput("in",  "array");
  this.addOutput("out","array");
  this.properties = {};
  this.size        = [320, 160];
  this.resizable   = true;
  this.color       = "#050505";
  this.bgcolor     = "#030303";
  this._result     = "";
  this._is_error   = false;
}
APLPanelNode.title = "Panel";
APLPanelNode.desc  = "Displays evaluation result";

// Expand hit area on both sides to include port dots outside the node
APLPanelNode.prototype.isPointInside = function(x, y, margin) {
  margin = margin || 0;
  var pad = 20;
  return x >= this.pos[0] - pad - margin &&
         x <= this.pos[0] + this.size[0] + pad + margin &&
         y >= this.pos[1] - margin &&
         y <= this.pos[1] + this.size[1] + margin;
};

// Input receives from RIGHT; output exits LEFT.
APLPanelNode.prototype.getConnectionPos = function(is_input, num, out) {
  out = out || new Float32Array(2);
  var H  = LiteGraph.NODE_TITLE_HEIGHT || 20;
  var S  = LiteGraph.NODE_SLOT_HEIGHT  || 40;
  var W  = this.size[0];
  var px = this.pos[0], py = this.pos[1];
  if      (is_input  && num === 0) { out[0] = px + W + H * 0.5; out[1] = py + H + S * 0.5; }
  else if (!is_input && num === 0) { out[0] = px - H * 0.5;      out[1] = py + H + S * 0.5; }
  return out;
};

APLPanelNode.prototype.onDrawForeground = function(ctx) {
  var w  = this.size[0], h = this.size[1];
  var H  = LiteGraph.NODE_TITLE_HEIGHT || 20;
  var S  = LiteGraph.NODE_SLOT_HEIGHT  || 40;
  var y0 = H + S * 0.5;
  var bg = this.bgcolor || '#030303';

  // Background + border
  ctx.fillStyle = '#030803';
  ctx.fillRect(0, 0, w, h);
  ctx.strokeStyle = this._is_error ? '#ff4444' : '#003300';
  ctx.lineWidth   = 1;
  ctx.strokeRect(0.5, 0.5, w - 1, h - 1);

  // Cover default dots (fillRect already covers interior; these get the edge)
  coverDot(ctx, 0, y0, bg);
  coverDot(ctx, w, y0, bg);

  // Custom dots
  var inConn  = this.inputs[0]  && this.inputs[0].link != null;
  var outConn = this.outputs[0] && this.outputs[0].links && this.outputs[0].links.length > 0;
  drawSlotDot(ctx,  w + H * 0.5, y0, inConn);
  drawSlotDot(ctx, -H * 0.5,     y0, outConn);

  // Port labels
  ctx.font = '10px monospace';
  ctx.fillStyle = '#004400';
  ctx.textAlign = 'right'; ctx.fillText('in вҶ’', w - 4, y0 + 4);
  ctx.textAlign = 'left';  ctx.fillText('вҶҗ out', 4,    y0 + 4);

  drawPanelResult(ctx, this);
};

APLPanelNode.prototype.onExecute = function() {
  var v = this.getInputData(0);
  if (v !== undefined) this.setOutputData(0, v);
};

LiteGraph.registerNodeType("APL/Panel", APLPanelNode);


// в”Җв”Җ APL/Rhino/Point в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function APLRhinoPointNode() {

  this.properties = {};
  this.size    = [200, 52];
  this.color   = "#150015";
  this.bgcolor = "#0a000a";
  this._status = "";
}
APLRhinoPointNode.title = "вҶ’ Rhino Point";
APLRhinoPointNode.desc  = "Send a 3-element array to Rhino as a point";

APLRhinoPointNode.prototype.onDrawForeground = function(ctx) {

LiteGraph.registerNodeType("APL/Rhino/Point", APLRhinoPointNode);



// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// 5. GRAPH & CANVAS SETUP
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
var graph  = new LGraph();
var canvas = document.getElementById("mycanvas");

function resizeCanvas() {
  var wrap = document.getElementById("canvas-wrap");
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  if (lgCanvas) lgCanvas.resize();
}

var lgCanvas = new LGraphCanvas(canvas, graph);

lgCanvas.background_image         = null;
lgCanvas.clear_background         = true;
lgCanvas.clear_background_color   = "#000000";
lgCanvas.render_canvas_border     = false;
lgCanvas.render_connection_arrows = false;
lgCanvas.connections_width        = 2;
lgCanvas.node_title_color         = "#00ff00";
lgCanvas.default_link_color       = "#00aa00";
lgCanvas.highquality_render       = true;

lgCanvas.drawGrid = function(ctx) {
  var STEP = 40;
  ctx.strokeStyle = "#0a0f0a";
  ctx.lineWidth   = 0.5;
  var w = canvas.width, h = canvas.height;
  var ox = lgCanvas.offset[0] % STEP, oy = lgCanvas.offset[1] % STEP;
  ctx.beginPath();
  for (var x = ox; x < w; x += STEP) { ctx.moveTo(x, 0); ctx.lineTo(x, h); }
  for (var y = oy; y < h; y += STEP) { ctx.moveTo(0, y); ctx.lineTo(w, y); }
  ctx.stroke();
};

window.addEventListener("resize", resizeCanvas);
resizeCanvas();
graph.start();

// Hook undo snapshots onto graph mutation events
graph.onNodeAdded      = function() { snapHistory(); };
graph.onNodeRemoved    = function() { snapHistory(); };
graph.onConnectionChange = function() { snapHistory(); };

}

// 6b. UNDO / REDO  (snapshot-based, max 40 states)
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
var _hist = [], _histPos = -1, _histLock = false;

function snapHistory() {
  if (_histLock) return;
  _hist = _hist.slice(0, _histPos + 1);
  _hist.push(JSON.stringify(graph.serialize()));
  if (_hist.length > 40) _hist.shift(); else _histPos++;
}

function undoGraph() {
  if (_histPos <= 0) { setLog('nothing to undo', ''); return; }
  _histLock = true;
  _histPos--;
  graph.configure(JSON.parse(_hist[_histPos]));
  _histLock = false;
  setLog('undo  (' + _histPos + '/' + (_hist.length - 1) + ')', '');
}

function redoGraph() {
  if (_histPos >= _hist.length - 1) { setLog('nothing to redo', ''); return; }
  _histLock = true;
  _histPos++;
  graph.configure(JSON.parse(_hist[_histPos]));
  _histLock = false;
  setLog('redo  (' + _histPos + '/' + (_hist.length - 1) + ')', '');
}

// 7. SERVER STATUS CHECK
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function checkStatus() {
  fetch('/status')
    .then(function(r) { return r.json(); })
    .then(function(s) {
      var ok = s.dyalog && s.dyalog !== 'not found';
      setStatus('st-dyalog', ok, ok ? 'DYALOG' : 'NO DYALOG');
      setStatus('st-rhino', true, 'RHINO ' + s.rhino);
    })
    .catch(function() {
      setStatus('st-dyalog', false, 'SERVER DOWN');
      setStatus('st-rhino',  false, 'SERVER DOWN');
    });
}
checkStatus();

// 8. RUN
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
var boxingOn = false;

function runGraph() {
  setLog('evaluatingвҖҰ', '');
  document.getElementById('btn-run').disabled = true;

  var payload = graph.serialize();
  payload.boxing = boxingOn;

  fetch('/execute', {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify(payload),
  })
  .then(function(r) { return r.json(); })
  .then(function(results) {
    document.getElementById('btn-run').disabled = false;

    if (results.error) {
      setLog('ERROR: ' + results.error, 'error');
      return;
    }

    // Update every node that has a result
    var nodeResults = results.nodes || {};
    var updated = 0;
    for (var i = 0; i < graph._nodes.length; i++) {
      var node = graph._nodes[i];
      var text = nodeResults[String(node.id)];
      if (text !== undefined) {
        node._result   = text;
        node._is_error = text.startsWith('ERROR:');
        node.setDirtyCanvas(true);
        updated++;
      }
      if (node.type === 'APL/Rhino/Point') {
        var sent = results.rhino_points && results.rhino_points.length > 0;
        node._status = sent ? 'вң“ sent to Rhino' : 'вҡ  not sent';
        node.setDirtyCanvas(true);
      }
    }

    var pts = results.rhino_points ? results.rhino_points.length : 0;
    var msg = 'вң“ ran вҖ” ' + updated + ' node(s) updated';
    if (pts) msg += ', ' + pts + ' point(s) вҶ’ Rhino';
    if (results.stderr && results.stderr.trim()) {
      // Show first line of stderr in the log bar
      var firstErr = results.stderr.trim().split('\n')[0];
      msg += '  [stderr: ' + firstErr + ']';
    }
    setLog(msg, 'ok');
  })
  .catch(function(err) {
    document.getElementById('btn-run').disabled = false;
    setLog('fetch error: ' + err, 'error');
  });
}


// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// 9. MERGE
// Select exactly 2 APL/Function (or APL/Input) nodes, then MERGE.
// Sorts left-to-right in canvas; produces "leftExpr rightExpr" as a
// simple space-separated train (no double-paren wrapping that can
// mis-parse when the server adds its own outer parens).
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function mergeSelected() {
  var sel = graph._nodes.filter(function(n) {
    return (n.type === 'APL/Function' || n.type === 'APL/Input') &&
           (n.is_selected || (lgCanvas.selected_nodes && lgCanvas.selected_nodes[n.id]));
  });
  if (sel.length !== 2) {
    setLog('Select exactly 2 Function or Input nodes to merge', 'error');
    return;
  }
  sel.sort(function(a, b) { return a.pos[0] - b.pos[0]; });
  var exprLeft  = sel[0].properties.expr || sel[0].properties.data || '';
  var exprRight = sel[1].properties.expr || sel[1].properties.data || '';
  // Simple space-separated: server wraps the whole thing in one pair of parens
  var combined  = exprLeft + ' ' + exprRight;

  var newNode = LiteGraph.createNode('APL/Function');
  newNode.pos = [
    (sel[0].pos[0] + sel[1].pos[0]) / 2,
    Math.max(sel[0].pos[1] + sel[0].size[1], sel[1].pos[1] + sel[1].size[1]) + 40,
  ];
  newNode.properties.expr = combined;
  newNode._widget.value   = combined;
  newNode.title           = combined;
  graph.add(newNode);
  setLog('Merged: ' + combined, 'ok');
}


// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// 10. APL GLYPH KEYBOARD
// Injects glyphs into the active litegraph text-edit dialog.
// Uses mousedown + preventDefault so focus stays in the dialog input.
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
var KB_ROWS = [
  ['Scalar',      ['+', '-', 'Г—', 'Г·', '*', 'вҢҠ', 'вҢҲ', '|', '!', '?']],
  ['Compare',     ['<', 'вүӨ', '=', 'вүҘ', '>', 'вү ']],
  ['Logic',       ['вҲ§', 'вҲЁ', 'вҚІ', 'вҚұ', '~']],
  ['Array',       ['вҚі', 'вҚҙ', 'вүў', 'вүЎ', ',', 'вҚӘ', 'вҶ‘', 'вҶ“', 'вҠҶ', 'вҠӮ', 'вҠғ', 'вҲҠ', 'вҚ·', 'вҢ·', 'вҚё']],
  ['Structural',  ['вҢҪ', 'вҠ–', 'вҚү', 'вҚӢ', 'вҚ’', 'вҠў', 'вҠЈ', 'вҠӨ', 'вҠҘ']],
  ['Reduce',      ['/', '\\', 'вҢҝ', 'вҚҖ']],
  ['Math',        ['в—Ӣ', 'вҢ№', 'вҚҹ', 'вҲҳ.']],
  ['Format',      ['вҚ•', 'вҚҺ', 'вҺ•', 'вҚһ']],
  ['Operators',   ['ВЁ', 'вҚЁ', 'вҚЈ', 'вҚӨ', 'вҚҘ', 'вҲҳ', '@', 'вҢё', 'вҢә']],
  ['Dfn',         ['{', '}', 'вҚө', 'вҚә', 'вҚ¶', 'вҚ№', 'вӢ„', 'вҶ’', 'вҶҗ', 'вҲҮ']],
  ['Special',     ['вҚ¬', 'вҚқ', 'вҚ ', 'вҚ«', 'вҺ•IOвҶҗ0', 'вҺ•IOвҶҗ1']],
];

function insertGlyph(g) {
  // Try the tracked dialog input first
  var inp = window._aplKbTarget;
  // Fallback: any visible graphdialog input
  if (!inp || !document.body.contains(inp)) {
    inp = document.querySelector('.graphdialog input[type="text"]');
    window._aplKbTarget = inp;
  }
  if (!inp) { setLog('Open a node text field first (click its label)', ''); return; }
  var s   = inp.selectionStart || 0;
  var e   = inp.selectionEnd   || 0;
  var val = inp.value;
  inp.value = val.substring(0, s) + g + val.substring(e);
  inp.selectionStart = inp.selectionEnd = s + g.length;
  inp.focus();
  inp.dispatchEvent(new Event('input', { bubbles: true }));
}

function buildKeyboard() {
  var kb = document.getElementById('glyph-kb');
  var html = '';
  for (var r = 0; r < KB_ROWS.length; r++) {
    var cat    = KB_ROWS[r][0];
    var glyphs = KB_ROWS[r][1];
    html += '<div class="kb-row"><span class="kb-cat">' + cat + '</span>';
    for (var g = 0; g < glyphs.length; g++) {
      var glyph = glyphs[g];
      // Use data-g attribute; the onclick calls insertGlyph
      html += '<button class="kb-glyph" data-g="' + encodeURIComponent(glyph) +
              '" title="' + glyph + '">' + glyph + '</button>';
    }
    html += '</div>';
  }
  html += '<div class="kb-row"><span class="kb-cat"></span>' +
          '<span class="kb-tip">Click a node\'s label to open its editor, then click glyphs here</span></div>';
  kb.innerHTML = html;

  // Attach mousedown to every glyph button (mousedown runs before blur)
  var tip = document.getElementById('glyph-tooltip');
  var btns = kb.querySelectorAll('.kb-glyph');
  for (var i = 0; i < btns.length; i++) {
    btns[i].addEventListener('mousedown', function(e) {
      e.preventDefault();
      insertGlyph(decodeURIComponent(this.dataset.g));
    });
    btns[i].addEventListener('mousemove', function(e) {
      var g = decodeURIComponent(this.dataset.g);
      var desc = GLYPH_DESC[g];
      if (!desc) { tip.style.display = 'none'; return; }
      tip.textContent = g + '   ' + desc;
      tip.style.display = 'block';
      tip.style.left = Math.min(e.clientX + 12, window.innerWidth - 340) + 'px';
      tip.style.top  = (e.clientY - 40) + 'px';
    });
    btns[i].addEventListener('mouseleave', function() {
      tip.style.display = 'none';
    });
  }
}

var kbOpen = false;
var KB_HEIGHT = 0;

function measureKbHeight() {
  var kb = document.getElementById('glyph-kb');
  return kb.offsetHeight;
}

function toggleKeyboard() {
  var kb  = document.getElementById('glyph-kb');
  var btn = document.getElementById('btn-kb');
  kbOpen = !kbOpen;
  if (kbOpen) {
    kb.classList.add('open');
    btn.classList.add('active');
    KB_HEIGHT = measureKbHeight();
  } else {
    kb.classList.remove('open');
    btn.classList.remove('active');
    KB_HEIGHT = 0;
  }
  document.documentElement.style.setProperty('--kb-h', KB_HEIGHT + 'px');
  resizeCanvas();
}

buildKeyboard();

function toggleBoxing() {
  boxingOn = !boxingOn;
  var btn = document.getElementById('btn-box');
  btn.classList.toggle('active', boxingOn);
  btn.textContent = boxingOn ? 'вҠһ BOX' : 'вҳҗ BOX';
  setLog('Boxing ' + (boxingOn ? 'ON вҖ” uses вҺ•SE.Dyalog.Utils.display' : 'OFF'), '');
}


// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// 12. SAVE / LOAD
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function saveGraph() {
  var data = JSON.stringify(graph.serialize(), null, 2);
  var blob = new Blob([data], { type: 'application/json' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href   = url; a.download = 'apl_sandbox.json'; a.click();
  URL.revokeObjectURL(url);
  setLog('saved apl_sandbox.json', 'ok');
}

function loadGraph(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      graph.configure(JSON.parse(e.target.result));
      setLog('loaded ' + file.name, 'ok');
    } catch(err) {
      setLog('load error: ' + err, 'error');
    }
  };
  reader.readAsText(file);
}


// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// 13. UI EVENT WIRING
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
document.getElementById('btn-run')  .addEventListener('click', runGraph);
document.getElementById('btn-merge').addEventListener('click', mergeSelected);
document.getElementById('btn-kb')   .addEventListener('click', toggleKeyboard);
document.getElementById('btn-box')  .addEventListener('click', toggleBoxing);
document.getElementById('btn-save') .addEventListener('click', saveGraph);
document.getElementById('btn-clear').addEventListener('click', function() {
  if (confirm('Clear the canvas?')) { graph.clear(); setLog('canvas cleared', ''); }
});
document.getElementById('file-input').addEventListener('change', function(e) {
  if (e.target.files[0]) loadGraph(e.target.files[0]);
  e.target.value = "";
});

document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); runGraph(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 's')     { e.preventDefault(); saveGraph(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undoGraph(); }
  if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); redoGraph(); }
  // Escape closes any open litegraph search / dialog
  if (e.key === 'Escape') {
    var dlg = document.querySelector('.litegraph.dialog, .graphdialog');
    if (dlg && dlg.parentNode) dlg.parentNode.removeChild(dlg);
  }
}, true);

// в”Җв”Җ Prune litegraph registry to APL-only в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// Removes any default litegraph node types so the canvas search shows
// only our nodes.
(function pruneRegistry() {
  var types = LiteGraph.registered_node_types;
  Object.keys(types).forEach(function(k) {
    if (!k.startsWith('APL/')) delete types[k];
  });
})();


// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// 14. STARTER GRAPH вҖ” RTL layout: вҚө source on RIGHT, result on LEFT
//
//  [Input: 3 3 3]  is to the RIGHT of [Function: вҚі]
//  [Function: вҚі]   is to the RIGHT of [Panel]
//  Wires flow right-to-left, matching APL evaluation order.
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
(function buildStarter() {
  var panel = LiteGraph.createNode('APL/Panel');
  panel.pos  = [40, 80];
  panel.size = [300, 160];
  graph.add(panel);

  var fn = LiteGraph.createNode('APL/Function');
  fn.pos = [400, 90];
  fn.properties.expr = 'вҚі';
  fn._widget.value   = 'вҚі';
  fn.title = 'вҚі';
  graph.add(fn);

  var input = LiteGraph.createNode('APL/Input');
  input.pos = [650, 90];
  input.properties.data = '3 3 3';
  input._widget.value   = '3 3 3';
  graph.add(input);

  // input.output[0] вҶ’ fn.input[0]  (вҚө)
  input.connect(0, fn, 0);
  // fn.output[0]    вҶ’ panel.input[0]
  fn.connect(0, panel, 0);

  setLog('APL_Sandbox ready вҖ” graph flows right вҶ’ left like APL', 'ok');
})();

</script>
