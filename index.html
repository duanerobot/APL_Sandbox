<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>APL SANDBOX</title>
<link rel="stylesheet" href="https://unpkg.com/litegraph.js@0.7.18/css/litegraph.css">
<style>
/* ── reset & theme ─────────────────────────────────────────────────── */
:root {
  --bg:       #000000;
  --bg2:      #080808;
  --bg3:      #0d0d0d;
  --fg:       #00ff00;
  --fg-dim:   #004d00;
  --fg-mid:   #00aa00;
  --accent:   #ff00ff;
  --acc-dim:  #550055;
  --err:      #ff4444;
  --border:   #1a1a1a;
  --bar-h:    36px;
  --font:     'Fira Code', 'Cascadia Code', 'Source Code Pro', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font);
  font-size: 13px;
  overflow: hidden;
}

/* ── toolbar ──────────────────────────────────────────────────────── */
#toolbar {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--bar-h);
  background: var(--bg2);
  border-bottom: 1px solid var(--fg-dim);
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 12px;
  z-index: 100;
  user-select: none;
}

#logo {
  font-size: 15px;
  font-weight: bold;
  letter-spacing: 0.15em;
  color: var(--fg);
  margin-right: 8px;
}

.btn {
  background: var(--bg3);
  border: 1px solid var(--fg-dim);
  color: var(--fg);
  font-family: var(--font);
  font-size: 12px;
  padding: 3px 12px;
  cursor: pointer;
  letter-spacing: 0.05em;
  transition: border-color 0.1s, color 0.1s;
}
.btn:hover   { border-color: var(--fg); }
.btn:active  { background: var(--fg-dim); }
.btn.run     { border-color: var(--accent); color: var(--accent); }
.btn.run:hover { background: var(--acc-dim); }

#file-input { display: none; }

#sep { flex: 1; }

#status {
  display: flex; gap: 12px;
  font-size: 11px;
  letter-spacing: 0.05em;
}
.dot { font-size: 10px; margin-right: 3px; }
.status-item        { color: var(--fg-dim); }
.status-item.ok     { color: var(--fg-mid); }
.status-item.error  { color: var(--err); }

/* ── canvas ────────────────────────────────────────────────────────── */
#canvas-wrap {
  position: fixed;
  top: var(--bar-h); left: 0; right: 0; bottom: 20px;
}
canvas#mycanvas {
  display: block;
  width: 100%;
  height: 100%;
  background: var(--bg);
}

/* ── log bar ───────────────────────────────────────────────────────── */
#logbar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 20px;
  background: var(--bg2);
  border-top: 1px solid var(--fg-dim);
  display: flex;
  align-items: center;
  padding: 0 10px;
  font-size: 11px;
  color: var(--fg-dim);
  overflow: hidden;
  white-space: nowrap;
}
#logbar.error { color: var(--err); }
#logbar.ok    { color: var(--fg-mid); }

/* ── litegraph overrides ───────────────────────────────────────────── */
.litegraph .litemenu-entry:hover { background: var(--fg-dim); }

/* scrollbar */
::-webkit-scrollbar            { width: 6px; }
::-webkit-scrollbar-track      { background: var(--bg); }
::-webkit-scrollbar-thumb      { background: var(--fg-dim); }
::-webkit-scrollbar-thumb:hover { background: var(--fg-mid); }
</style>
</head>

<body>

<!-- ── toolbar ──────────────────────────────────────────────────────── -->
<div id="toolbar">
  <span id="logo">⍝ APL SANDBOX</span>

  <button class="btn run" id="btn-run" title="Run graph (Ctrl+Enter)">▶ RUN</button>
  <button class="btn" id="btn-save" title="Save graph (Ctrl+S)">⬇ SAVE</button>
  <label class="btn" title="Load graph">
    ⬆ LOAD
    <input type="file" id="file-input" accept=".json">
  </label>
  <button class="btn" id="btn-clear" title="New empty graph">✕ CLEAR</button>

  <span id="sep"></span>

  <div id="status">
    <span class="status-item" id="st-dyalog"><span class="dot">●</span>DYALOG</span>
    <span class="status-item" id="st-rhino"><span class="dot">●</span>RHINO</span>
  </div>
</div>

<!-- ── canvas ────────────────────────────────────────────────────────── -->
<div id="canvas-wrap">
  <canvas id="mycanvas"></canvas>
</div>

<!-- ── log bar ───────────────────────────────────────────────────────── -->
<div id="logbar" id="logbar">ready</div>

<!-- ── litegraph ─────────────────────────────────────────────────────── -->
<script src="https://unpkg.com/litegraph.js@0.7.18/build/litegraph.js"></script>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════════════
// 1. LITEGRAPH THEME
// ═══════════════════════════════════════════════════════════════════════
LiteGraph.NODE_DEFAULT_COLOR     = "#111111";
LiteGraph.NODE_DEFAULT_BGCOLOR   = "#080808";
LiteGraph.NODE_DEFAULT_BOXCOLOR  = "#00ff00";
LiteGraph.NODE_TITLE_COLOR       = "#00ff00";
LiteGraph.NODE_SELECTED_TITLE_COLOR = "#ff00ff";
LiteGraph.NODE_TEXT_SIZE         = 12;
LiteGraph.NODE_TEXT_COLOR        = "#00cc00";
LiteGraph.NODE_SUBTEXT_SIZE      = 10;
LiteGraph.NODE_SLOT_HEIGHT       = 18;
LiteGraph.WIDGET_BGCOLOR         = "#0d0d0d";
LiteGraph.WIDGET_TEXT_COLOR      = "#00cc00";
LiteGraph.WIDGET_OUTLINE_COLOR   = "#003300";
LiteGraph.LINK_COLOR             = "#00aa00";
LiteGraph.EVENT_LINK_COLOR       = "#ff00ff";
LiteGraph.CONNECTING_LINK_COLOR  = "#ff00ff";
LiteGraph.DEFAULT_SHADOW_COLOR   = "transparent";

// ═══════════════════════════════════════════════════════════════════════
// 2. NODE TYPE DEFINITIONS
// ═══════════════════════════════════════════════════════════════════════

// ── APL/Input ──────────────────────────────────────────────────────────
function APLInputNode() {
  this.addOutput("value", "array");
  this.properties = { data: "1 2 3 4 5" };
  this.size = [220, 54];
  this.color   = "#001500";
  this.bgcolor = "#000a00";

  var self = this;
  this._widget = this.addWidget("text", "⍵", this.properties.data, function(v) {
    self.properties.data = v;
  });
}
APLInputNode.title = "Input";
APLInputNode.desc  = "APL data — enter a literal array, e.g. 3 3⍴⍳9";

APLInputNode.prototype.onExecute = function() {
  this.setOutputData(0, this.properties.data);
};

LiteGraph.registerNodeType("APL/Input", APLInputNode);


// ── APL/Function ────────────────────────────────────────────────────────
function APLFunctionNode() {
  this.addInput("⍵", "array");
  this.addInput("⍺", "array");
  this.addOutput("result", "array");
  this.properties = { expr: "⍳" };
  this.size = [170, 80];
  this.color   = "#001100";
  this.bgcolor = "#000800";

  var self = this;
  this._widget = this.addWidget("text", "f", this.properties.expr, function(v) {
    self.properties.expr = v;
    self.title = v || "Function";
  });
  this.title = this.properties.expr || "Function";
}
APLFunctionNode.title = "Function";
APLFunctionNode.desc  = "APL function — glyph, train, or dfn";

APLFunctionNode.prototype.onDrawForeground = function(ctx) {
  var expr = this.properties.expr || "";
  if (!expr) return;
  // Show the expression large above the widget
  ctx.save();
  ctx.font      = "bold 20px 'Fira Code', monospace";
  ctx.fillStyle = "#00ff00";
  ctx.textAlign = "center";
  ctx.fillText(expr, this.size[0] * 0.5, 30);
  ctx.restore();
};

LiteGraph.registerNodeType("APL/Function", APLFunctionNode);


// ── APL/Panel ───────────────────────────────────────────────────────────
function APLPanelNode() {
  this.addInput("in", "array");
  this.addOutput("out", "array");
  this.properties = { _result: "" };
  this.size        = [320, 160];
  this.resizable   = true;
  this.color       = "#050505";
  this.bgcolor     = "#030303";
  this._result     = "";
  this._is_error   = false;
}
APLPanelNode.title = "Panel";
APLPanelNode.desc  = "Displays evaluation result";

APLPanelNode.prototype.onDrawForeground = function(ctx) {
  var w   = this.size[0];
  var h   = this.size[1];
  var pad = 8;

  // Background fill
  ctx.fillStyle = "#030803";
  ctx.fillRect(0, 0, w, h);

  // Border
  ctx.strokeStyle = this._is_error ? "#ff4444" : "#003300";
  ctx.lineWidth = 1;
  ctx.strokeRect(0.5, 0.5, w - 1, h - 1);

  // Text
  var text = this._result;
  if (!text) {
    ctx.font      = "11px monospace";
    ctx.fillStyle = "#003300";
    ctx.fillText("— not evaluated —", pad, 22);
    return;
  }

  ctx.font      = "12px 'Fira Code', 'Cascadia Code', monospace";
  ctx.fillStyle = this._is_error ? "#ff4444" : "#00dd00";

  var lines   = text.split("\n");
  var lh      = 16;
  var y       = 20;
  var max_y   = h - pad;

  for (var i = 0; i < lines.length; i++) {
    if (y > max_y) break;
    ctx.fillText(lines[i], pad, y);
    y += lh;
  }
};

APLPanelNode.prototype.onExecute = function() {
  // Pass through so downstream connections get the last result
  var v = this.getInputData(0);
  if (v !== undefined) this.setOutputData(0, v);
};

LiteGraph.registerNodeType("APL/Panel", APLPanelNode);


// ── APL/Rhino/Point ─────────────────────────────────────────────────────
function APLRhinoPointNode() {
  this.addInput("coords", "array");
  this.properties = {};
  this.size    = [200, 52];
  this.color   = "#150015";
  this.bgcolor = "#0a000a";
  this._status = "";
}
APLRhinoPointNode.title = "→ Rhino Point";
APLRhinoPointNode.desc  = "Send a 3-element array to Rhino as a point";

APLRhinoPointNode.prototype.onDrawForeground = function(ctx) {
  ctx.font      = "11px monospace";
  ctx.fillStyle = this._status.startsWith("✓") ? "#00aa00" : "#550055";
  ctx.fillText(this._status || "─ connect coords ─", 8, 22);
};

LiteGraph.registerNodeType("APL/Rhino/Point", APLRhinoPointNode);


// ═══════════════════════════════════════════════════════════════════════
// 3. GRAPH & CANVAS SETUP
// ═══════════════════════════════════════════════════════════════════════
var graph  = new LGraph();
var canvas = document.getElementById("mycanvas");

// Size canvas to fill parent
function resizeCanvas() {
  var wrap = document.getElementById("canvas-wrap");
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  if (lgCanvas) lgCanvas.resize();
}

var lgCanvas = new LGraphCanvas(canvas, graph);

// Visual settings
lgCanvas.background_image          = null;
lgCanvas.clear_background          = true;
lgCanvas.clear_background_color    = "#000000";
lgCanvas.render_canvas_border      = false;
lgCanvas.render_connection_arrows  = false;
lgCanvas.connections_width         = 2;
lgCanvas.node_title_color          = "#00ff00";
lgCanvas.default_link_color        = "#00aa00";
lgCanvas.highquality_render        = true;

// Draw grid manually so we can control color
lgCanvas.drawGrid = function(ctx) {
  var STEP = 40;
  ctx.strokeStyle = "#0a0f0a";
  ctx.lineWidth   = 0.5;
  var w = canvas.width, h = canvas.height;
  var ox = lgCanvas.offset[0] % STEP;
  var oy = lgCanvas.offset[1] % STEP;
  ctx.beginPath();
  for (var x = ox; x < w; x += STEP) { ctx.moveTo(x, 0); ctx.lineTo(x, h); }
  for (var y = oy; y < h; y += STEP) { ctx.moveTo(0, y); ctx.lineTo(w, y); }
  ctx.stroke();
};

window.addEventListener("resize", resizeCanvas);
resizeCanvas();
graph.start();


// ═══════════════════════════════════════════════════════════════════════
// 4. UTILITIES
// ═══════════════════════════════════════════════════════════════════════
var logEl = document.getElementById("logbar");

function setLog(msg, type) {
  logEl.textContent  = msg;
  logEl.className    = type || "";
}

function setStatus(id, ok, label) {
  var el = document.getElementById(id);
  el.className   = "status-item " + (ok ? "ok" : "error");
  el.innerHTML   = '<span class="dot">●</span>' + label;
}


// ═══════════════════════════════════════════════════════════════════════
// 5. SERVER STATUS CHECK
// ═══════════════════════════════════════════════════════════════════════
function checkStatus() {
  fetch('/status')
    .then(function(r) { return r.json(); })
    .then(function(s) {
      var dyalogOk = s.dyalog && s.dyalog !== 'not found';
      setStatus('st-dyalog', dyalogOk, dyalogOk ? 'DYALOG' : 'NO DYALOG');
      setStatus('st-rhino', true, 'RHINO ' + s.rhino);
    })
    .catch(function() {
      setStatus('st-dyalog', false, 'SERVER DOWN');
      setStatus('st-rhino',  false, 'SERVER DOWN');
    });
}
checkStatus();


// ═══════════════════════════════════════════════════════════════════════
// 6. RUN
// ═══════════════════════════════════════════════════════════════════════
function runGraph() {
  setLog("evaluating...", "");
  document.getElementById("btn-run").disabled = true;

  var serialized = graph.serialize();

  fetch('/execute', {
    method:  'POST',
    headers: {'Content-Type': 'application/json'},
    body:    JSON.stringify(serialized),
  })
  .then(function(r) { return r.json(); })
  .then(function(results) {
    document.getElementById("btn-run").disabled = false;

    if (results.error) {
      setLog("ERROR: " + results.error, "error");
      return;
    }

    // Update panel nodes
    var updated = 0;
    for (var i = 0; i < graph._nodes.length; i++) {
      var node = graph._nodes[i];
      if (node.type === 'APL/Panel') {
        var text = results.panels[String(node.id)];
        if (text !== undefined) {
          node._result    = text;
          node._is_error  = text.startsWith('ERROR:');
          node.setDirtyCanvas(true);
          updated++;
        }
      }
      if (node.type === 'APL/Rhino/Point') {
        var sent = results.rhino_points && results.rhino_points.length > 0;
        node._status = sent ? "✓ sent to Rhino" : "⚠ not sent";
        node.setDirtyCanvas(true);
      }
    }

    var pts = results.rhino_points ? results.rhino_points.length : 0;
    var msg = "✓ ran — " + updated + " panel(s) updated";
    if (pts) msg += ", " + pts + " point(s) → Rhino";
    if (results.stderr && results.stderr.trim()) {
      msg += "  [stderr: " + results.stderr.trim().split('\n')[0] + "]";
    }
    setLog(msg, "ok");
  })
  .catch(function(err) {
    document.getElementById("btn-run").disabled = false;
    setLog("fetch error: " + err, "error");
  });
}


// ═══════════════════════════════════════════════════════════════════════
// 7. SAVE / LOAD
// ═══════════════════════════════════════════════════════════════════════
function saveGraph() {
  var data = JSON.stringify(graph.serialize(), null, 2);
  var blob = new Blob([data], {type: 'application/json'});
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href   = url;
  a.download = 'apl-graph.json';
  a.click();
  URL.revokeObjectURL(url);
  setLog("saved apl-graph.json", "ok");
}

function loadGraph(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      graph.configure(data);
      setLog("loaded " + file.name, "ok");
    } catch(err) {
      setLog("load error: " + err, "error");
    }
  };
  reader.readAsText(file);
}


// ═══════════════════════════════════════════════════════════════════════
// 8. UI EVENT WIRING
// ═══════════════════════════════════════════════════════════════════════
document.getElementById("btn-run").addEventListener("click", runGraph);
document.getElementById("btn-save").addEventListener("click", saveGraph);
document.getElementById("btn-clear").addEventListener("click", function() {
  if (confirm("Clear the canvas?")) {
    graph.clear();
    setLog("canvas cleared", "");
  }
});

document.getElementById("file-input").addEventListener("change", function(e) {
  if (e.target.files[0]) loadGraph(e.target.files[0]);
  e.target.value = "";
});

// Keyboard shortcuts
document.addEventListener("keydown", function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    runGraph();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    saveGraph();
  }
});


// ═══════════════════════════════════════════════════════════════════════
// 9. STARTER GRAPH — a simple example so the canvas isn't blank
// ═══════════════════════════════════════════════════════════════════════
(function buildStarter() {
  var input = LiteGraph.createNode("APL/Input");
  input.pos = [60, 80];
  input.properties.data = "3 3 3";
  input._widget.value   = "3 3 3";
  graph.add(input);

  var fn = LiteGraph.createNode("APL/Function");
  fn.pos = [340, 80];
  fn.properties.expr = "⍳";
  fn._widget.value   = "⍳";
  fn.title = "⍳";
  graph.add(fn);

  var panel = LiteGraph.createNode("APL/Panel");
  panel.pos  = [580, 60];
  panel.size = [300, 160];
  graph.add(panel);

  // wire input → fn ⍵
  input.connect(0, fn, 0);
  // wire fn → panel
  fn.connect(0, panel, 0);
})();

</script>
</body>
</html>
